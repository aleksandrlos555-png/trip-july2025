<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Родинна подорож · Липень 2025</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root {
  --bg: #F8F7F4;
  --surface: #FFFFFF;
  --surface2: #F1EFE8;
  --border: rgba(0,0,0,0.09);
  --border-strong: rgba(0,0,0,0.15);
  --text: #1A1A18;
  --text2: #6B6B67;
  --text3: #9B9B96;
  --radius: 10px;
  --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 12px rgba(0,0,0,0.04);
  --accent: #185FA5;
  --accent-bg: #E6F1FB;
  --font: -apple-system, 'Segoe UI', system-ui, sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #141412;
    --surface: #1E1E1B;
    --surface2: #272724;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.14);
    --text: #F0EFE8;
    --text2: #9B9B96;
    --text3: #5F5E5A;
    --accent: #85B7EB;
    --accent-bg: #0C2A45;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; min-height: 100vh; }
a { color: var(--accent); }

/* Layout */
.app { max-width: 900px; margin: 0 auto; padding: 1rem; }
.app-header { padding: 1.25rem 0 1rem; border-bottom: 0.5px solid var(--border); margin-bottom: 1.25rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.app-title { font-size: 20px; font-weight: 600; letter-spacing: -0.3px; }
.app-meta { font-size: 12px; color: var(--text2); margin-top: 3px; }

/* Nav tabs */
.main-nav { display: flex; gap: 2px; margin-bottom: 1.25rem; border-bottom: 0.5px solid var(--border); overflow-x: auto; padding-bottom: 0; }
.mnav-btn { padding: 8px 14px; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-size: 13px; color: var(--text2); margin-bottom: -1px; white-space: nowrap; display: inline-flex; align-items: center; gap: 5px; font-family: var(--font); transition: color .15s; }
.mnav-btn:hover { color: var(--text); }
.mnav-btn.on { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
.view { display: none; }
.view.on { display: block; }

/* Cards */
.card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: .875rem; box-shadow: var(--shadow); }
.card-title { font-size: 13px; font-weight: 500; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .75rem; }

/* KPI grid */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 8px; margin-bottom: 1rem; }
.kpi { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: .7rem 1rem; box-shadow: var(--shadow); }
.kpi-l { font-size: 11px; color: var(--text2); }
.kpi-v { font-size: 22px; font-weight: 600; margin-top: 2px; letter-spacing: -0.5px; }

/* Timeline */
.tl-wrap { overflow-x: auto; margin-bottom: 1rem; padding-bottom: 4px; }
.tl-grid { display: flex; gap: 4px; min-width: max-content; }
.dc { width: 68px; cursor: pointer; flex-shrink: 0; border-radius: var(--radius); padding: 5px 3px; transition: background .12s; }
.dc:hover { background: var(--surface2); }
.dc.on { background: var(--surface); box-shadow: var(--shadow); }
.dn { text-align: center; font-size: 13px; font-weight: 500; padding: 3px 4px; border-radius: 6px; margin-bottom: 2px; }
.dc.on .dn { background: var(--text); color: var(--bg); }
.dw { text-align: center; font-size: 10px; color: var(--text3); margin-bottom: 4px; }
.dseg { height: 6px; border-radius: 3px; margin-bottom: 3px; }
.dlbl { font-size: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 2px 4px; border-radius: 4px; font-weight: 500; text-align: center; }

/* Legend */
.legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 1rem; }
.leg { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
.leg-d { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

/* Detail panel */
.detail { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: .875rem; box-shadow: var(--shadow); }
.detail-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: .85rem; flex-wrap: wrap; }
.detail-city { font-size: 16px; font-weight: 600; }
.detail-date { font-size: 12px; color: var(--text2); margin-top: 2px; }
.det-badge { padding: 3px 11px; border-radius: 20px; font-size: 11px; font-weight: 500; }

/* Inner tabs */
.itabs { display: flex; gap: 1px; border-bottom: 0.5px solid var(--border); margin-bottom: .85rem; overflow-x: auto; }
.itab { padding: 6px 12px; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-size: 12px; color: var(--text2); margin-bottom: -1px; white-space: nowrap; display: inline-flex; align-items: center; gap: 4px; font-family: var(--font); }
.itab:hover { color: var(--text); }
.itab.on { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }
.itab-pane { display: none; }
.itab-pane.on { display: block; }

/* Schedule */
.sched { display: flex; flex-direction: column; gap: 5px; }
.se { display: flex; gap: 10px; align-items: flex-start; }
.se-time { font-size: 12px; color: var(--text2); min-width: 42px; padding-top: 4px; flex-shrink: 0; font-variant-numeric: tabular-nums; }
.se-body { flex: 1; background: var(--surface2); border-radius: 8px; padding: 7px 10px; }
.se-title { font-size: 13px; font-weight: 500; }
.se-sub { font-size: 12px; color: var(--text2); margin-top: 1px; }
.se-tag { display: inline-block; font-size: 10px; padding: 1px 8px; border-radius: 20px; margin-top: 4px; font-weight: 500; }

/* Tasks */
.task-list { display: flex; flex-direction: column; gap: 4px; }
.task { display: flex; align-items: center; gap: 9px; padding: 8px 10px; background: var(--surface2); border-radius: 8px; cursor: pointer; user-select: none; transition: background .12s; }
.task:hover { background: var(--border); }
.tcb { width: 17px; height: 17px; border: 1.5px solid var(--border-strong); border-radius: 4px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.tcb.done { background: var(--text); border-color: var(--text); }
.tcb.done::after { content: '✓'; font-size: 11px; color: var(--bg); font-weight: 600; }
.tlbl { flex: 1; font-size: 13px; }
.tlbl.done { text-decoration: line-through; color: var(--text3); }
.ttag { font-size: 10px; padding: 1px 8px; border-radius: 20px; flex-shrink: 0; font-weight: 500; }

/* Budget */
.bud-grid { display: grid; grid-template-columns: 1fr 70px 90px 64px; gap: 5px; align-items: center; }
.bud-hd { font-size: 11px; color: var(--text3); font-weight: 500; padding-bottom: 5px; border-bottom: 0.5px solid var(--border); }
.bud-row { padding: 5px 0; border-bottom: 0.5px solid var(--border); }
.bud-row:last-child { border-bottom: none; }
.bud-cat { font-size: 13px; color: var(--text2); }
.bud-plan { font-size: 13px; font-weight: 500; text-align: right; }
.bud-actual input { width: 100%; padding: 4px 6px; font-size: 12px; border-radius: 6px; border: 0.5px solid var(--border-strong); background: var(--surface); color: var(--text); text-align: right; font-family: var(--font); }
.bud-diff { font-size: 12px; font-weight: 500; text-align: right; }
.bud-total { font-weight: 600; padding-top: 7px; border-top: 1px solid var(--border-strong); margin-top: 4px; font-size: 13px; }

/* Hotel */
.hotel-card { background: var(--surface2); border-radius: 8px; padding: 10px 12px; }
.hotel-name { font-weight: 500; font-size: 14px; }
.hotel-note { font-size: 12px; color: var(--text2); margin-top: 4px; line-height: 1.5; }
.hotel-link { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: var(--accent); margin-top: 8px; text-decoration: none; }

/* Note box */
.note-box { background: #FAEEDA; border-radius: 8px; padding: 10px 12px; font-size: 13px; color: #633806; line-height: 1.6; display: flex; gap: 8px; }
@media (prefers-color-scheme: dark) { .note-box { background: #2A1F00; color: #F5C06A; } }

/* Packing */
.pack-mtabs { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
.pmtab { padding: 5px 12px; border: 0.5px solid var(--border-strong); border-radius: 20px; cursor: pointer; font-size: 12px; background: none; color: var(--text2); font-family: var(--font); transition: all .12s; }
.pmtab.on { background: var(--text); color: var(--bg); border-color: transparent; }
.pcat-f { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
.pchip { padding: 3px 10px; border: 0.5px solid var(--border); border-radius: 20px; cursor: pointer; font-size: 11px; background: none; color: var(--text2); font-family: var(--font); }
.pchip.on { background: var(--surface2); border-color: var(--border-strong); color: var(--text); }
.pbar-wrap { height: 4px; background: var(--surface2); border-radius: 2px; margin-bottom: 10px; overflow: hidden; }
.pbar-fill { height: 100%; border-radius: 2px; background: var(--text); transition: width .3s; }
.plist { display: flex; flex-direction: column; gap: 3px; }
.pi { display: flex; align-items: center; gap: 8px; padding: 6px 9px; border-radius: 8px; background: var(--surface2); cursor: pointer; transition: background .12s; }
.pi:hover { background: var(--border); }
.pcb { width: 15px; height: 15px; border: 1.5px solid var(--border-strong); border-radius: 3px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
.pcb.done { background: var(--text); border-color: var(--text); }
.pcb.done::after { content: '✓'; font-size: 10px; color: var(--bg); font-weight: 600; }
.plbl { flex: 1; font-size: 13px; }
.plbl.done { text-decoration: line-through; color: var(--text3); }
.pwho { font-size: 10px; padding: 1px 7px; border-radius: 20px; flex-shrink: 0; font-weight: 500; }
.pcat-hd { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: .04em; margin: 10px 0 4px 2px; }

/* Schedule editor */
.evt-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
.evt { display: grid; grid-template-columns: 68px 1fr auto auto; gap: 6px; align-items: center; background: var(--surface2); border-radius: 8px; padding: 7px 9px; cursor: pointer; transition: background .12s; }
.evt:hover { background: var(--border); }
.evt.sel { outline: 1.5px solid var(--accent); }
.evt input[type=time] { font-size: 12px; padding: 3px 5px; border-radius: 6px; border: 0.5px solid var(--border-strong); background: var(--surface); color: var(--text); width: 100%; font-family: var(--font); cursor: pointer; }
.evt-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.evt-sub { font-size: 11px; color: var(--text2); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.evt-tag { font-size: 10px; padding: 1px 7px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
.del-btn { background: none; border: none; cursor: pointer; color: var(--text3); font-size: 18px; line-height: 1; padding: 2px 4px; border-radius: 4px; }
.del-btn:hover { color: #A32D2D; background: #FCEBEB; }
.edit-expand { background: var(--surface); border: 0.5px solid var(--border-strong); border-radius: 8px; padding: 8px 10px; margin-top: 3px; display: none; }
.edit-expand.on { display: block; }
.edit-expand input, .edit-expand select { width: 100%; font-size: 12px; padding: 5px 8px; border-radius: 6px; border: 0.5px solid var(--border-strong); background: var(--surface2); color: var(--text); margin-bottom: 5px; font-family: var(--font); }
.add-evt-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: flex-start; padding-top: 10px; border-top: 0.5px solid var(--border); margin-top: 4px; }
.add-evt-row input, .add-evt-row select { font-size: 12px; padding: 5px 8px; border-radius: 6px; border: 0.5px solid var(--border-strong); background: var(--surface2); color: var(--text); font-family: var(--font); }
.add-evt-row input[type=time] { width: 80px; flex-shrink: 0; }
.add-evt-row input[type=text] { flex: 1; min-width: 110px; }

/* Buttons */
.btn { padding: 7px 14px; border: 0.5px solid var(--border-strong); border-radius: var(--radius); background: none; color: var(--text); cursor: pointer; font-size: 13px; display: inline-flex; align-items: center; gap: 5px; font-family: var(--font); transition: background .12s; }
.btn:hover { background: var(--surface2); }
.btn-p { background: var(--text); color: var(--bg); border-color: transparent; }
.btn-p:hover { opacity: .85; }
.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 8px; }
.btn-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: .75rem; }

/* AI box */
.ai-box { background: var(--surface2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem; margin-top: .75rem; font-size: 13px; line-height: 1.7; display: none; }
.spin { display: inline-block; width: 13px; height: 13px; border: 2px solid var(--border-strong); border-top-color: var(--text2); border-radius: 50%; animation: sp .7s linear infinite; vertical-align: -2px; margin-right: 5px; }
@keyframes sp { to { transform: rotate(360deg); } }

/* Misc */
.empty { color: var(--text3); font-size: 13px; text-align: center; padding: 1.5rem; border: 0.5px dashed var(--border-strong); border-radius: var(--radius); }
.sep { height: 0.5px; background: var(--border); margin: .75rem 0; }
input:focus, select:focus, textarea:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
</style>
</head>
<body>
<div class="app">

<div class="app-header">
  <div>
    <div class="app-title">✈ Родинна подорож · Липень 2025</div>
    <div class="app-meta">Бровари → Варшава → Лондон → Дублін → Варшава → Бровари · 4–18 липня · Саша, Олена, Наташа</div>
  </div>
  <button class="btn btn-p btn-sm" onclick="aiAnalyze()"><i class="ti ti-sparkles"></i> AI аналіз ↗</button>
</div>

<div class="main-nav">
  <button class="mnav-btn on" onclick="showView('dashboard',this)"><i class="ti ti-layout-dashboard"></i> Дашборд</button>
  <button class="mnav-btn" onclick="showView('schedule',this)"><i class="ti ti-calendar-event"></i> Розклад</button>
  <button class="mnav-btn" onclick="showView('pack',this)"><i class="ti ti-briefcase"></i> Речі</button>
  <button class="mnav-btn" onclick="showView('budget',this)"><i class="ti ti-currency-euro"></i> Бюджет</button>
</div>

<!-- DASHBOARD -->
<div id="view-dashboard" class="view on">
  <div class="kpi-grid" id="kpi-grid"></div>
  <div class="legend">
    <div class="leg"><div class="leg-d" style="background:#7F77DD"></div>Бровари→Варшава (авто)</div>
    <div class="leg"><div class="leg-d" style="background:#378ADD"></div>Варшава</div>
    <div class="leg"><div class="leg-d" style="background:#D85A30"></div>Лондон</div>
    <div class="leg"><div class="leg-d" style="background:#1D9E75"></div>Дублін</div>
    <div class="leg"><div class="leg-d" style="background:#BA7517"></div>Повернення</div>
  </div>
  <div class="tl-wrap"><div class="tl-grid" id="tl-dash"></div></div>
  <div id="dash-detail"></div>
  <div class="btn-row">
    <button class="btn btn-sm" onclick="aiDayPlan()"><i class="ti ti-calendar"></i> AI план дня ↗</button>
    <button class="btn btn-sm" onclick="aiHotels()"><i class="ti ti-building"></i> AI готелі ↗</button>
    <button class="btn btn-sm" onclick="aiRouteOpt()"><i class="ti ti-route"></i> AI логістика ↗</button>
  </div>
  <div id="ai-dash" class="ai-box"></div>
</div>

<!-- SCHEDULE EDITOR -->
<div id="view-schedule" class="view">
  <div class="card" style="margin-bottom:.75rem">
    <div style="font-size:13px;color:var(--text2);display:flex;align-items:center;gap:6px">
      <i class="ti ti-pencil" style="font-size:15px"></i>
      Клікни на подію щоб редагувати · час змінюй прямо у полі · додавай і видаляй події
    </div>
  </div>
  <div class="tl-wrap"><div class="tl-grid" id="tl-sched"></div></div>
  <div class="detail" id="sched-panel"></div>
  <div class="btn-row">
    <button class="btn btn-sm" onclick="moveEvt(-1)"><i class="ti ti-arrow-up"></i> Вгору</button>
    <button class="btn btn-sm" onclick="moveEvt(1)"><i class="ti ti-arrow-down"></i> Вниз</button>
    <button class="btn btn-sm" onclick="sortDay()"><i class="ti ti-sort-ascending"></i> По часу</button>
    <button class="btn btn-sm" onclick="aiCheckDay()"><i class="ti ti-sparkles"></i> AI перевірка дня ↗</button>
    <button class="btn btn-sm" onclick="exportTxt()"><i class="ti ti-download"></i> Завантажити .txt</button>
  </div>
  <div id="ai-sched" class="ai-box"></div>
</div>

<!-- PACKING LIST -->
<div id="view-pack" class="view">
  <div class="card">
    <div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">
      <input id="pack-new-name" type="text" placeholder="Нова річ..." style="flex:1;min-width:110px;font-size:13px;padding:6px 9px;border-radius:8px;border:0.5px solid var(--border-strong);background:var(--surface2);color:var(--text);font-family:var(--font)" onkeydown="if(event.key==='Enter')addPackItem()">
      <select id="pack-new-cat" style="font-size:12px;padding:6px 8px;border-radius:8px;border:0.5px solid var(--border-strong);background:var(--surface2);color:var(--text);font-family:var(--font)">
        <option>Документи</option><option>Медицина</option><option>Одяг</option><option>Взуття</option>
        <option>Гігієна</option><option>Техніка</option><option>Аксесуари</option><option>Фінанси</option><option>Розваги</option><option>Інше</option>
      </select>
      <select id="pack-new-who" style="font-size:12px;padding:6px 8px;border-radius:8px;border:0.5px solid var(--border-strong);background:var(--surface2);color:var(--text);font-family:var(--font)">
        <option value="all">Всі</option><option>Саша</option><option>Олена</option><option>Наташа</option>
      </select>
      <button class="btn btn-sm btn-p" onclick="addPackItem()"><i class="ti ti-plus"></i> Додати</button>
    </div>
    <div class="pack-mtabs" id="pack-mtabs"></div>
    <div class="pcat-f" id="pack-cats"></div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <div class="pbar-wrap" style="flex:1"><div class="pbar-fill" id="pbar"></div></div>
      <span style="font-size:12px;color:var(--text2);white-space:nowrap" id="pbar-lbl">0/0</span>
    </div>
    <div id="pack-list"></div>
  </div>
</div>

<!-- BUDGET -->
<div id="view-budget" class="view">
  <div class="kpi-grid" id="bud-kpi"></div>
  <div id="bud-days"></div>
</div>

<div id="ai-global" class="ai-box"></div>
</div>

<script>
// ─── DATA ──────────────────────────────────────────────────────────────────
const TAG_OPTS=[
  {v:'авто',c:'#EEEDFE',t:'#3C3489'},{v:'кордон',c:'#FAECE7',t:'#712B13'},
  {v:'готель',c:'#E6F1FB',t:'#0C447C'},{v:'їжа',c:'#F1EFE8',t:'#444441'},
  {v:'туризм',c:'#E1F5EE',t:'#085041'},{v:'парк',c:'#EAF3DE',t:'#27500A'},
  {v:'аеропорт',c:'#FAEEDA',t:'#633806'},{v:'літак',c:'#E6F1FB',t:'#0C447C'},
  {v:'робота',c:'#FCEBEB',t:'#791F1F'},{v:'банк',c:'#FAECE7',t:'#712B13'},
  {v:'ВАЖЛИВО',c:'#FAECE7',t:'#712B13'},{v:'зупинка',c:'#F1EFE8',t:'#444441'},
  {v:'музей',c:'#E1F5EE',t:'#085041'},{v:'шопінг',c:'#EEEDFE',t:'#3C3489'},
  {v:'відпочинок',c:'#FAEEDA',t:'#633806'},{v:'родина',c:'#E1F5EE',t:'#085041'},
  {v:'прибуття',c:'#E1F5EE',t:'#085041'},{v:'культура',c:'#E1F5EE',t:'#085041'},
  {v:'транспорт',c:'#E6F1FB',t:'#0C447C'},{v:'друзі',c:'#EEEDFE',t:'#3C3489'},
  {v:'фінал',c:'#E1F5EE',t:'#085041'},{v:'рішення',c:'#F1EFE8',t:'#444441'},
];
function tc(v){const f=TAG_OPTS.find(t=>t.v===v);return f||{c:'#F1EFE8',t:'#444441'};}
function tagSel(){return TAG_OPTS.map(t=>`<option value="${t.v}">${t.v}</option>`).join('');}

const DAYS=[
  {d:'4',m:'лип',wd:'Пт',seg:'drive',city:'Бровари→Львів',segColor:'#7F77DD',

function selEvtFn(i){selSchedEvt=selSchedEvt===i?-1:i;document.getElementById('sched-evts').innerHTML=renderEvts();}
function changeTime(i,v){DAYS[selSchedDay].events[i].t=v;document.getElementById('sched-evts').innerHTML=renderEvts();}
function changeField(i,f,v){DAYS[selSchedDay].events[i][f]=v;}
function delEvt(i){DAYS[selSchedDay].events.splice(i,1);selSchedEvt=-1;document.getElementById('sched-evts').innerHTML=renderEvts();}
function addEvt(){
  const title=document.getElementById('ne-title')?.value?.trim();
  if(!title)return;
  DAYS[selSchedDay].events.push({id:'u'+Date.now(),t:document.getElementById('ne-t').value||'09:00',title,sub:document.getElementById('ne-sub')?.value?.trim()||'',tag:document.getElementById('ne-tag')?.value||'зупинка'});
  document.getElementById('ne-title').value='';document.getElementById('ne-sub').value='';
  document.getElementById('sched-evts').innerHTML=renderEvts();
}
function moveEvt(dir){
  if(selSchedEvt<0)return;
  const evts=DAYS[selSchedDay].events,ni=selSchedEvt+dir;
  if(ni<0||ni>=evts.length)return;
  [evts[selSchedEvt],evts[ni]]=[evts[ni],evts[selSchedEvt]];
  selSchedEvt=ni;
  document.getElementById('sched-evts').innerHTML=renderEvts();
}
function sortDay(){
  DAYS[selSchedDay].events.sort((a,b)=>a.t.localeCompare(b.t));
  selSchedEvt=-1;
  document.getElementById('sched-evts').innerHTML=renderEvts();
}
function exportTxt(){
  const lines=['РОЗКЛАД ПОДОРОЖІ · ЛИПЕНЬ 2025 · Саша, Олена, Наташа',''];
  DAYS.forEach(d=>{
    lines.push(`=== ${d.d} ${d.m} (${d.wd}) — ${d.city} ===`);
    d.events.forEach(e=>lines.push(`  ${e.t}  ${e.title}${e.sub?' — '+e.sub:''}`));

}

const MEMBER_C={Саша:{bg:'#E6F1FB',t:'#0C447C'},Олена:{bg:'#E1F5EE',t:'#085041'},Наташа:{bg:'#EEEDFE',t:'#3C3489'},all:{bg:'#F1EFE8',t:'#444441'}};
function renderPack(){
  const allCats=[...new Set(extraPack.map(p=>p.cat))];
  let items=extraPack;
  if(packMember!=='all') items=items.filter(i=>i.who===packMember||i.who==='all');
  if(packCat!=='all') items=items.filter(i=>i.cat===packCat);
  const done=items.filter(i=>packState[i.id]??false).length;
  const pct=items.length?Math.round(done/items.length*100):0;
  const cats=[...new Set(items.map(i=>i.cat))];
  document.getElementById('pack-mtabs').innerHTML=
    ['all','Саша','Олена','Наташа'].map(m=>`<button class="pmtab${packMember===m?' on':''}" onclick="packMember='${m}';renderPack()">${m==='all'?'Всі':m}</button>`).join('');

    ['all',...allCats].map(c=>`<button class="pchip${packCat===c?' on':''}" onclick="packCat='${c}';renderPack()">${c==='all'?'Всі':c}</button>`).join('');
  document.getElementById('pbar').style.width=pct+'%';
  document.getElementById('pbar-lbl').textContent=`${done}/${items.length} (${pct}%)`;
  document.getElementById('pack-list').innerHTML=cats.map(cat=>{
    const ci=items.filter(i=>i.cat===cat);
    const mc=MEMBER_C[packMember]||MEMBER_C.all;
    return`<div class="pcat-hd">${cat}</div>
    <div class="plist">${ci.map(item=>{const d=packState[item.id]??false;const wc=MEMBER_C[item.who]||MEMBER_C.all;return`
      <div class="pi" onclick="togglePack('${item.id}')">
        <div class="pcb${d?' done':''}"></div>

      </div>`}).join('')}

  }).join('');
}

// ─── AI ────────────────────────────────────────────────────────────────────
async function callAI(prompt){
  try{
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:900,messages:[{role:'user',content:prompt}]})});
    const data=await r.json();
    return data.content?.find(b=>b.type==='text')?.text||'Немає відповіді';
  }catch(e){return'Помилка підключення до AI';}
}
function showAI(boxId, html){const b=document.getElementById(boxId);b.style.display='block';b.innerHTML=html;}

async function aiAnalyze(){
  const box='ai-global';showAI(box,'<span class="spin"></span>AI аналізує весь маршрут...');
  const allTasks=DAYS.flatMap(d=>d.tasks||[]);
  const open=allTasks.filter(t=>!(taskState[t.id]??false)).map(t=>t.label).join('; ');
  const text=await callAI(`Сімейна подорож 4-18 липня 2025: Бровари→Львів(авто,4 лип вечір)→кордон Ягодин(5 лип зранку)→Варшава→Лондон Stansted(9 лип,Modlin)→Дублін Stansted(13 лип)→Варшава Modlin(16 лип)→Бровари(17 лип). Учасники: Олександр 48р CEO, Олена 49р СКВ-уникати сонця/перевтоми, Наташа 17р-подача візи США 8 лип. Відкриті задачі: ${open}. Дай 6 конкретних порад по ризикам і пріоритетам. Коротко, пункти, українською.`);
  showAI(box,text.replace(/\n/g,'<br>'));
}
